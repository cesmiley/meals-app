services:
  - type: web
    name: meal-planner-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: meal-planner-db
          property: connectionString

databases:
  - name: meal-planner-db
    plan: free
    ipAllowList: []
